name: انتقال فایل به گیت هاب

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'لینک ۱ (الزامی)'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'لینک ۲ (اختیاری)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'لینک ۳ (اختیاری)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'لینک ۴ (اختیاری)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'لینک ۵ (اختیاری)'
        required: false
        type: string
        default: ''
      zip_password:
        description: '🔒 تعیین رمز برای فایل آرشیو'
        required: false
        type: string
        default: ''
      split_size:
        description: |
          حداکثر حجم هر تکه (مگابایت)
        required: false
        type: choice
        default: '95  (حداکثر - برای فایل‌های حجیم)'
        options:
          - '25  (اینترنت ضعیف - فایل‌های کوچک)'
          - '50  (متوسط)'
          - '95  (حداکثر - برای فایل‌های حجیم)'
      delete_old_archives:
        description: 'پاک کردن فایل‌های قبلی (در صورت تیک زدن، تمام آرشیوهای قدیمی حذف میشن)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sci-hub-queue
  cancel-in-progress: false
  queue: max

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.7z.*" -o -name "*.7z" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.7z.* 2>/dev/null || true
          git rm --cached *.7z 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true
          echo "Old archives cleaned."

      - name: Parse inputs
        id: parse
        run: |
          SIZE=$(echo "${{ github.event.inputs.split_size }}" | grep -oP '\d+')
          echo "split_mb=${SIZE:-95}" >> $GITHUB_OUTPUT

          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF

          sed -i '/^$/d' urls.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' urls.txt

          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat -n urls.txt

      - name: Install 7z
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full

      - name: Download all files
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0

          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Downloading: $url"

            # Build a safe filename
            FILENAME_FROM_URL=$(echo "$url" | sed 's/?.*//' | xargs basename)
            if [ -z "$FILENAME_FROM_URL" ]; then
              FILENAME_FROM_URL="unknown_${counter}"
            fi

            FILENAME_BASE="${FILENAME_FROM_URL%.*}"
            FILENAME_EXT="${FILENAME_FROM_URL##*.}"
            if [ "$FILENAME_BASE" = "$FILENAME_FROM_URL" ]; then
              FILENAME_EXT=""
            fi

            PREFIX="sci-hub.ir"
            if [ "$total" -gt 1 ]; then
              NUM=$(printf '%02d' $counter)
              DL_NAME="${PREFIX}_${NUM}_${FILENAME_BASE}"
            else
              DL_NAME="${PREFIX}_${FILENAME_BASE}"
            fi

            MAXLEN=50
            if [ ${#DL_NAME} -gt $MAXLEN ]; then
              if [ "$total" -gt 1 ]; then
                KEEP=$((MAXLEN - ${#PREFIX} - 4))
              else
                KEEP=$((MAXLEN - ${#PREFIX} - 1))
              fi
              DL_NAME="${DL_NAME:0:$MAXLEN}"
            fi

            if [ -n "$FILENAME_EXT" ]; then
              FINAL_FILENAME="${DL_NAME}.${FILENAME_EXT}"
            else
              FINAL_FILENAME="${DL_NAME}"
            fi

            echo "Download filename: ${FINAL_FILENAME}"

            # --- DOWNLOAD WITH RETRY & RESUME ---
            attempt=0
            max_attempts=10
            download_ok=false

            while [ $attempt -lt $max_attempts ]; do
              attempt=$((attempt + 1))
              echo "Attempt $attempt/$max_attempts..."

              # If partial file exists, resume (-C -)
              if [ -f "files/${FINAL_FILENAME}" ]; then
                echo "Resuming partial download..."
                curl -L --retry 3 --retry-delay 10 --connect-timeout 60 \
                     -C - -o "files/${FINAL_FILENAME}" "$url" && download_ok=true && break
              else
                curl -L --retry 3 --retry-delay 10 --connect-timeout 60 \
                     -o "files/${FINAL_FILENAME}" "$url" && download_ok=true && break
              fi

              echo "Download failed. Waiting 10 seconds before retry..."
              sleep 10
            done

            if [ "$download_ok" = true ]; then
              size=$(ls -lh "files/${FINAL_FILENAME}" | awk '{print $5}')
              echo "Downloaded: ${FINAL_FILENAME} ($size)"
              success=$((success + 1))
            else
              echo "Failed to download after $max_attempts attempts: $url"
            fi

            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT
          echo "Downloaded: $success / $total"

      - name: Process and archive each file
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"

          echo "Output folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"

          counter=0

          for file in files/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))

            echo "========================================="
            echo "Processing: $(basename "$file")"

            FILENAME=$(basename "$file")

            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            fi

            if [ -f "${FOLDER}/${FILENAME}.7z.001" ] && [ ! -f "${FOLDER}/${FILENAME}.7z.002" ]; then
              mv "${FOLDER}/${FILENAME}.7z.001" "${FOLDER}/${FILENAME}.7z"
              echo "Single chunk"
            else
              echo "Multiple chunks"
            fi
          done

          rm -rf files

          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          # افزایش بافر برای انتقال فایل‌های بزرگ
          git config http.postBuffer 157286400

      - name: Commit and Push each chunk one by one
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"

          echo "Adding and pushing files from ${FOLDER} one by one..."

          total_files=$(ls "${FOLDER}"/*.7z* 2>/dev/null | wc -l)

          if [ "$total_files" -eq 0 ]; then
            echo "No chunk files found. Skipping push."
            exit 0
          fi

          file_index=0
          push_success=true

          for chunk in "${FOLDER}"/*.7z*; do
            file_index=$((file_index + 1))
            echo "------------------------------------------------"
            echo "[$file_index/$total_files] Pushing: $(basename "$chunk")"

            git add "$chunk"
            git commit -m "Add chunk $(basename "$chunk") [${file_index}/${total_files}]"

            # Pull any changes from remote (only if something exists)
            git pull --rebase origin main 2>/dev/null || true

            if git push origin main; then
              echo "Chunk $file_index pushed successfully."
            else
              echo "Failed to push chunk $file_index. Aborting."
              push_success=false
              break
            fi
          done

          if [ "$push_success" = false ]; then
            echo "One or more chunks failed to push."
            exit 1
          fi

          echo "All chunks pushed."

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          TOTAL_SIZE=$(du -sh "$FOLDER" 2>/dev/null | awk '{print $1}')
          if [ -z "$TOTAL_SIZE" ]; then TOTAL_SIZE="N/A"; fi

          echo ""
          echo "========================================="
          echo "Job completed!"
          echo "Downloaded: ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }}"
          echo "Processed: ${{ steps.process_files.outputs.processed_count }} file(s)"
          echo "Split size: ${{ steps.parse.outputs.split_mb }}MB"
          echo "Folder: $FOLDER"
          echo "Total size: ${TOTAL_SIZE}"
          echo "========================================="

          cat >> $GITHUB_STEP_SUMMARY << EOF
          <div dir="rtl">

          ## 📊 خلاصه اجرا

          | مورد | مقدار |
          |------|-------|
          | دانلود موفق | ${{ steps.download_files.outputs.success_count }} از ${{ steps.parse.outputs.url_count }} |
          | فایل پردازش شده | ${{ steps.process_files.outputs.processed_count }} عدد |
          | حداکثر حجم هر تکه | ${{ steps.parse.outputs.split_mb }} مگابایت |
          | حجم کل | ${TOTAL_SIZE} |
          | 📂 پوشه دانلود | [ ${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |
          | وضعیت | ✅ موفق |

           ---
          ## تقدیم به همه آن‌هایی که راهی جز عبور ندارند. - [حسین بلنج](https://balanj.ir)
                   
          </div>
          EOF
